apiVersion: apps/v1
kind: Deployment
metadata:
  name: tourist-system

spec:
  replicas: 2
  selector:
    matchLabels:
      app: tourist-system

  template:
    metadata:
      labels:
        app: tourist-system

    spec:
      containers:
      - name: tourist-system
        image: tourist-system:latest
        imagePullPolicy: Never   # 🔥 important
        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: tourist-system-service

spec:
  type: NodePort
  selector:
    app: tourist-system

  ports:
  - port: 80
    targetPort: 3000